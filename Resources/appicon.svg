<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hey Claude — app icon master.
  Concept "Crown Meter": the pixel-art Claude mascot centred on a pure-black
  macOS squircle, wearing a small level-meter equalizer as a crown. The five
  bars are the single spot of colour (Claude clay) and are the *rest state* of
  the same meter that springs to life in the menu-bar listening animation —
  static icon and live animation are visually continuous.

  Why a centred crown (not a corner/bottom meter):
   • A warm cluster top-RIGHT of a face reads as a sweat bead (😅); bottom-centre
     reads as drool/goatee and re-opens a head↔meter gap. Top-CENTRE has no such
     emoji misread — it reads unambiguously as a worn meter, and fuses with the
     head silhouette so it survives down to 16px.

  Geometry (1000×1000 canvas):
   • Squircle tile: rounded rect, r=224 (~22.4% — macOS-style corner).
   • Mascot: 16×8 pixel grid, translate(268,410) scale(2.9). Body drawn SEAM-FREE
     — one central column rect plus two slightly-overlapping wing rects — so the
     renderer leaves no hairline anti-alias seams. Eyes are black knockouts.
   • Crown meter: 5 capsule bars, CENTRE-aligned on a shared midline (a symmetric
     waveform, not a bottom-aligned mountain). Heights [14,26,18,34,22] (irregular,
     off-centre peak), w=9, pitch=12, rx=4.5. Placed at translate(51.5,-20) in
     grid space, sitting just above the crown.
-->
<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- pure-black squircle tile -->
  <rect x="0" y="0" width="1000" height="1000" rx="224" ry="224" fill="#000000"/>

  <!-- mascot (grid space, 10px cells), centred -->
  <g transform="translate(268,410) scale(2.9)">
    <!-- seam-free body -->
    <rect x="20" y="0" width="120" height="80" fill="#f3f2ef"/>
    <rect x="0" y="40" width="20.6" height="20" fill="#f3f2ef"/>
    <rect x="139.4" y="40" width="20.6" height="20" fill="#f3f2ef"/>
    <!-- eyes (knockout) -->
    <rect x="40" y="20" width="10" height="20" fill="#000000"/>
    <rect x="110" y="20" width="10" height="20" fill="#000000"/>

    <!-- crown meter (centre-aligned waveform) — the only colour -->
    <g transform="translate(51.5,-20)" fill="#D97757">
      <rect x="0"  y="-7"  width="9" height="14" rx="4.5" ry="4.5"/>
      <rect x="12" y="-13" width="9" height="26" rx="4.5" ry="4.5"/>
      <rect x="24" y="-9"  width="9" height="18" rx="4.5" ry="4.5"/>
      <rect x="36" y="-17" width="9" height="34" rx="4.5" ry="4.5"/>
      <rect x="48" y="-11" width="9" height="22" rx="4.5" ry="4.5"/>
    </g>
  </g>
</svg>
