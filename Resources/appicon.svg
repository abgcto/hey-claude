<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hey Claude — app icon master.
  Concept "Meter Feet": the pixel-art Claude mascot standing on its own
  level-meter equalizer. White artwork on a pure-black macOS squircle.

  Geometry (1000×1000 canvas):
   • Squircle tile: rounded rect, r=224 (~22.4% — macOS-style corner).
   • Mascot: the 16×10 pixel grid, placed at translate(280,230) scale(2.75).
     Body is drawn SEAM-FREE — one rect for the central column (grid rows 0–3)
     plus two slightly-overlapping wing rects for the wide middle row — so the
     renderer leaves no hairline anti-alias seams between pixel rows. Eyes are
     black knockouts; on the black tile they read as a face because the white
     head encloses them.
   • Meter: 5 capsule bars, heights [165, 95, 210, 70, 120] (irregular, off-centre
     peak — deliberately NOT a symmetric mountain), w=48, gap=30, r=22, baseline y=790.
-->
<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- pure-black squircle tile -->
  <rect x="0" y="0" width="1000" height="1000" rx="224" ry="224" fill="#000000"/>

  <!-- mascot (grid space, 10px cells) -->
  <g transform="translate(280,230) scale(2.75)">
    <!-- seam-free body -->
    <rect x="20" y="0" width="120" height="80" fill="#f3f2ef"/>
    <rect x="0" y="40" width="20.6" height="20" fill="#f3f2ef"/>
    <rect x="139.4" y="40" width="20.6" height="20" fill="#f3f2ef"/>
    <!-- eyes (knockout) -->
    <rect x="40" y="20" width="10" height="20" fill="#000000"/>
    <rect x="110" y="20" width="10" height="20" fill="#000000"/>
  </g>

  <!-- level meter (the "feet") -->
  <g fill="#f3f2ef">
    <rect x="320" y="625" width="48" height="165" rx="22" ry="22"/>
    <rect x="398" y="695" width="48" height="95"  rx="22" ry="22"/>
    <rect x="476" y="580" width="48" height="210" rx="22" ry="22"/>
    <rect x="554" y="720" width="48" height="70"  rx="22" ry="22"/>
    <rect x="632" y="670" width="48" height="120" rx="22" ry="22"/>
  </g>
</svg>
